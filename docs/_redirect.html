<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>chaotic-pfc — Documentacao</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    max-width: 520px;
    padding: 2rem;
  }
  h1 {
    font-size: 2.4rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: #fff;
  }
  .subtitle {
    font-size: 1.05rem;
    color: #a0a0c0;
    margin-bottom: 2.5rem;
    line-height: 1.5;
  }
  .lang-grid {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 2.5rem;
  }
  .lang-card {
    display: block;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 1.4rem 2rem;
    text-decoration: none;
    color: #e0e0e0;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    min-width: 180px;
  }
  .lang-card:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.28);
    transform: translateY(-2px);
  }
  .lang-card .flag {
    font-size: 2rem;
    display: block;
    margin-bottom: 0.4rem;
  }
  .lang-card .label {
    font-size: 1.05rem;
    font-weight: 600;
  }
  .lang-card .detail {
    font-size: 0.8rem;
    color: #8888aa;
    margin-top: 0.2rem;
  }
  footer {
    font-size: 0.78rem;
    color: #666;
  }
  footer a {
    color: #8888cc;
    text-decoration: none;
  }
  footer a:hover { text-decoration: underline; }
</style>
<script>
  (function() {
    var lang = navigator.language || navigator.userLanguage || "";
    if (/^pt\b/i.test(lang)) {
      window.location.replace("pt_BR/");
    } else {
      window.location.replace("en/");
    }
  })();
</script>
</head>
<body>
<div class="container">
  <h1>chaotic-pfc</h1>
  <p class="subtitle">
    Sistema de comunicacao digital caotico baseado no mapa de Henon.<br>
    <em>Chaotic digital communication system based on the Henon map.</em>
  </p>

  <div class="lang-grid">
    <a class="lang-card" href="en/">
      <span class="flag">&#x1f1fa;&#x1f1f8;</span>
      <span class="label">English</span>
      <span class="detail">Documentation</span>
    </a>
    <a class="lang-card" href="pt_BR/">
      <span class="flag">&#x1f1e7;&#x1f1f7;</span>
      <span class="label">Portugues (Brasil)</span>
      <span class="detail">Documentacao</span>
    </a>
  </div>

  <footer>
    <a href="https://github.com/fesa-academic-projects/chaotic-pfc">GitHub</a>
    &nbsp;&middot;&nbsp;
    <a href="https://chaotic-pfc.readthedocs.io">Read the Docs</a>
  </footer>
</div>
</body>
</html>
