name: Feature Request
description: Propose a new feature or enhancement.
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: What should the project do that it doesn't today?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this useful? What problem does it solve?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there workarounds today? Have you considered a different approach?
