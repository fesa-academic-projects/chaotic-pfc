name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 now to silence the Node.js 20 deprecation warning.
# Actions will be forced to Node.js 24 by default from June 2nd, 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Lint: Ruff check + format check
  # Fast, independent. Must pass before typecheck or test runs.
  # ───────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Ruff
        run: pip install "ruff>=0.6"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  # ───────────────────────────────────────────────────────────────────────
  # Type check: mypy on the library (src/chaotic_pfc)
  # ───────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,fast]"

      - name: Run mypy
        run: mypy src/chaotic_pfc

  # ───────────────────────────────────────────────────────────────────────
  # Unit tests: pytest with coverage, upload to Codecov.
  # Runs only after lint and typecheck both pass.
  # ───────────────────────────────────────────────────────────────────────
  test:
    name: Unit tests (pytest ${{ matrix.python-version }})
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,fast]"

      - name: Run the unit tests
        run: |
          pytest \
            --tb=short \
            --cov=chaotic_pfc \
            --cov-fail-under=55 \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ───────────────────────────────────────────────────────────────────────
  # Pipeline smoke test: runs only if unit tests passed.
  # Exercises every script end-to-end in quick mode.
  # ───────────────────────────────────────────────────────────────────────
  pipeline:
    name: Pipeline smoke test
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,fast]"

      - name: Run the full pipeline (quick sweep)
        run: chaotic-pfc run all --no-display --quick-sweep

  # ───────────────────────────────────────────────────────────────────────
  # Documentation: Sphinx build.
  # Runs after the smoke test so docs are built against a proven working
  # package state (API reference won't break silently).
  # ───────────────────────────────────────────────────────────────────────
  docs:
    name: Documentation (Sphinx)
    needs: pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the package and docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build HTML documentation
        run: sphinx-build -b html docs docs/_build/html

      - name: Upload docs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
          retention-days: 14
