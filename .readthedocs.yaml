# Read the Docs configuration file
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# Bilingual setup via RTD's native "Translations" feature:
# - Parent project (chaotic-pfc)         → Language: English      → /en/latest/
# - Translation project (chaotic-pfc-pt-br) → Language: Portuguese (BR) → /pt-br/latest/
#
# Both projects point to this same repository and read this same file.
# Sphinx picks the language from the READTHEDOCS_LANGUAGE env var
# that RTD injects per project.

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

formats:
  - pdf
  - epub
  - htmlzip
