# Pre-commit hooks for chaotic-pfc
#
# Install once:   pre-commit install
# Run manually:   pre-commit run --all-files
# Update hooks:   pre-commit autoupdate
#
# These hooks run on every `git commit` and reject the commit if any
# check fails. The same checks run on the CI, so this is mostly a
# convenience for catching problems locally without waiting for a
# push round-trip.

repos:
  # ── Basic file hygiene (fast, bundled with pre-commit) ────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(figures|data)/
      - id: end-of-file-fixer
        exclude: ^(figures|data)/
      - id: check-yaml
        exclude: ^(figures|data)/
      - id: check-toml
        exclude: ^(figures|data)/
      - id: check-json
        exclude: ^(figures|data)/
      - id: check-merge-conflict
        exclude: ^(figures|data)/
      - id: check-added-large-files
        args: ["--maxkb=2500"]
        exclude: ^(figures|data)/
      - id: check-ast
        exclude: ^(figures|data)/
      - id: check-case-conflict
        exclude: ^(figures|data)/
      - id: debug-statements
        exclude: ^(figures|data)/
      - id: mixed-line-ending
        exclude: ^(figures|data)/
      - id: detect-private-key
        exclude: ^(figures|data)/

  # ── Image optimization (manual — run with `make images` or
  #    pre-commit run --hook-stage manual --all-files) ────────────────────
  - repo: https://github.com/boidolr/pre-commit-images
    rev: v1.12.0
    hooks:
      - id: optimize-png
        stages: [manual]
      - id: optimize-svg
        stages: [manual]

  # ── Ruff — lint and format (fast, runs in milliseconds) ───────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── mypy — static type checking (uses project's pyproject.toml) ───────
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy src/chaotic_pfc
        language: system
        pass_filenames: false
        types: [python]
